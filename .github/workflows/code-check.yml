name: AI Code Checker for Blog

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI Code Check
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          cat > check_script.py << 'EOF'
import os, sys, re, glob, requests

API_KEY = os.getenv("LLM_API_KEY")
if not API_KEY:
    print("❌ 错误: 未设置 LLM_API_KEY 环境变量")
    sys.exit(1)

def check_single_block(lang, code):
    if lang.lower() in ['text', 'plaintext', 'txt']: 
        return True, "跳过纯文本"
    prompt = f"检查以下{lang}代码是否有明显错误（语法错误、逻辑漏洞等）。如果没有错误，请只回答'通过'；如果有错误，请简要说明。代码内容：\n\n{code}"
    try:
        resp = requests.post("https://api.siliconflow.cn/v1/chat/completions",
            headers={"Authorization": f"Bearer {API_KEY}", "Content-Type": "application/json"},
            json={"model": "Qwen/Qwen2.5-Coder-32B-Instruct", "messages": [{"role": "user", "content": prompt}], "max_tokens": 50})
        if resp.status_code == 200:
            result = resp.json()["choices"][0]["message"]["content"].strip().lower()
            return "通过" in result or "没问题" in result, result
        else:
            return False, f"API错误: {resp.status_code}"
    except Exception as e:
        return False, str(e)

md_files = glob.glob("**/*.md", recursive=True)
error_count = 0
total_blocks = 0
global_has_error = False

print("🔍 开始扫描 Markdown 文件...")

for file in md_files:
    if ".github/" in file or "node_modules/" in file: continue
    try:
        with open(file, 'r', encoding='utf-8') as f: content = f.read()
        blocks = re.findall(r'```(\w+)?\n(.*?)\n```', content, re.DOTALL)
        for lang, code in blocks:
            total_blocks += 1
            lang = lang or 'text'
            is_ok, msg = check_single_block(lang, code)
            if not is_ok:
                error_count += 1
                global_has_error = True
                print(f"❌ [FAIL] 文件: {file} | 语言: {lang} | 原因: {msg}")
    except Exception as e:
        print(f"⚠️ 读取文件失败 {file}: {e}")

if global_has_error:
    print(f"\n🔴 检查结束：发现 {error_count} 处潜在问题！")
    sys.exit(1)
else:
    print(f"\n🟢 检查通过！共扫描 {total_blocks} 个代码块，未发现明显错误。")
    sys.exit(0)
EOF
          python check_script.py
