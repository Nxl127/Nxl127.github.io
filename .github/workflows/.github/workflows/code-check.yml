name: AI Code Checker for Blog

# 触发条件：推送到 main 分支 或 发起 Pull Request 时
on:
  push:
    branches: [ "main", "master" ] 
  pull_request:
    branches: [ "main", "master" ]

jobs:
  check-code-quality:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 安装依赖库
      - name: Install dependencies
        run: |
          pip install requests

      # 4. 创建检查脚本
      - name: Create Checker Script
        run: |
          cat > check_script.py << 'EOF'
          import os
          import re
          import requests
          import glob
          import sys

          # 获取 GitHub Secrets 中的 API Key
          API_KEY = os.getenv("LLM_API_KEY")
          
          # --- Moonshot (Kimi) 配置 ---
          API_URL = "https://api.moonshot.cn/v1/chat/completions"
          MODEL_NAME = "moonshot-v1-8k" 
          # -------------------------

          if not API_KEY:
              print("❌ 错误：未找到 LLM_API_KEY 环境变量。")
              sys.exit(1)

          def extract_code_blocks(content):
              # 匹配 ```lang ... ``` 代码块
              pattern = r"```(\w*)\n(.*?)```"
              return re.findall(pattern, content, re.DOTALL)

          def check_single_block(lang, code):
              if not code.strip():
                  return True, "空代码块"
              
              prompt = f"""
              你是一个专业的技术博客代码审查员。请严格检查以下 {lang or '通用'} 代码片段：
              1. 是否存在语法错误？
              2. 是否存在明显的逻辑漏洞？
              3. 如果代码正确，请简要预测其输出结果。
              
              【重要规则】
              - 如果代码完全正确，只返回：PASS
              - 如果有错误，返回：FAIL: [错误原因]
              - 不要废话，直接给结论。
              
              代码内容：
              {code}
              """

              headers = {
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {API_KEY}"
              }
              
              payload = {
                  "model": MODEL_NAME,
                  "messages": [
                      {"role": "system", "content": "你是一个严谨的代码审查助手。"},
                      {"role": "user", "content": prompt}
                  ],
                  "temperature": 0.1, 
                  "max_tokens": 500
              }

              try:
                  response = requests.post(API_URL, json=payload, timeout=60)
                  response.raise_for_status()
                  result_text = response.json()['choices'][0]['message']['content'].strip()
                  
                  if result_text.startswith("PASS"):
                      return True, result_text
                  elif result_text.startswith("FAIL"):
                      return False, result_text
                  else:
                      # 兜底判断
                      if "错误" in result_text or "Error" in result_text or "fail" in result_text.lower():
                          return False, f"AI 检测到问题：{result_text}"
                      else:
                          return True, f"AI 认为通过：{result_text}"
                          
              except Exception as e:
                  return False, f"API 调用失败：{str(e)}"

          def main():
              # 扫描所有 markdown 文件
              # 如果你的文章都在特定目录（如 source/_posts），可以改为 glob.glob("source/_posts/**/*.md", recursive=True)
              md_files = glob.glob("**/*.md", recursive=True)
              
              # 过滤掉不需要检查的目录
              md_files = [f for f in md_files if "/node_modules/" not in f and "/.git/" not in f and "/public/" not in f]
              
              if not md_files:
                  print("ℹ️ 未找到 Markdown 文件。")
                  return

              global_has_error = False
              total_blocks = 0
              error_count = 0

              print(f"🔍 开始扫描 {len(md_files)} 个文件...")

              for file_path in md_files:
                  try:
                      with open(file_path, 'r', encoding='utf-8') as f:
                          content = f.read()
                  except:
                      continue

                  blocks = extract_code_blocks(content)
                  if not blocks:
                      continue
                      
                  print(f"\n📄 检查：{file_path}")
                  
                  for lang, code in blocks:
                      total_blocks += 1
                      # 跳过只有1行的代码块（通常是单行命令）
                      if len(code.split('\n')) < 2: 
                          continue
                      
                      is_ok, msg = check_single_block(lang, code)
                      
                      if not is_ok:
                          error_count += 1
                          global_has_error = True
                          print(f"   ❌ [FAIL] ({lang}): {msg}")
                      # 通过的就不打印了，保持日志干净

              print("\n" + "="*30)
              if global_has_error:
                  print(f"🛑 发现 {error_count} 处错误！构建终止。")
                  sys.exit(1) # 退出码 1 会让 Actions 变红，阻止部署
              else:
                  print(f"🎉 检查通过 (共 {total_blocks} 个代码块)。")
                  sys.exit(0)

          if __name__ == "__main__":
              main()
          EOF

      # 5. 运行检查脚本
      - name: Run AI Code Check
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python check_script.py
